<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CodingWithMannu</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <form id="loginForm">
        <h2 class="loginheading">Login</h2>
        <h2 class="cwmheading">CodingWithMannu</h2>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>

         <!-- Already account section -->
        <p class="already-account">
            Create an account?
            <a href="signup.html">Click here</a>
        </p>
    </form>

    <script>
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const res = await fetch("https://codingwithmannu-1.onrender.com/api/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (data.error) { alert(data.error); return; }

            localStorage.setItem("loggedInUser", email);
            localStorage.setItem("loggedInUserName", data.user.fullName);

            alert(data.message);
            window.location.href = "dashboard.html";
        });
    </script>
</body>

</html>
