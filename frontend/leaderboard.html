<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:#111;color:white;font-family:Arial;padding:20px;}
.card{background:#222;padding:10px;margin:10px;border-radius:8px;}
</style>
</head>

<body>

<h2>Leaderboard</h2>
<div id="board"></div>

<script>
const API="https://codingwithmannu-1.onrender.com";

fetch(API+"/leaderboard")
.then(res=>res.json())
.then(data=>{
    let html="";
    data.forEach((d,i)=>{
        html+=`<div class="card">
        <h3>#${i+1} ${d.name}</h3>
        <p>${d.score}/${d.total}</p>
        <p>${d.date}</p></div>`;
    });
    document.getElementById("board").innerHTML=html;
});
</script>

</body>
</html>
